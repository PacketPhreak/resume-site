<svg xmlns="http://www.w3.org/2000/svg" width="980" height="124" viewBox="0 0 980 124" role="img" aria-label="How to add archive material later reminder">
  <style>
    @keyframes flickerWhiteMain {
      0%, 18%, 22%, 25%, 53%, 57%, 100% {
        opacity: 1;
        filter: drop-shadow(0 0 3px #ffffff) drop-shadow(0 0 9px rgba(255,255,255,0.72));
      }
      20%, 24%, 55%, 56%, 90%, 93% {
        opacity: 0.24;
        filter: none;
      }
    }

    @keyframes flickerWhiteSubtle {
      0%, 31%, 34%, 70%, 100% {
        opacity: 0.95;
        filter: drop-shadow(0 0 3px rgba(255,255,255,0.84));
      }
      32%, 72%, 78% {
        opacity: 0.34;
        filter: none;
      }
    }

    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 32px;
      font-weight: 800;
      fill: #ffffff;
      animation: flickerWhiteMain 4.2s infinite;
    }

    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      fill: #ffffff;
      opacity: 0.92;
      animation: flickerWhiteSubtle 5.6s infinite;
    }
  </style>

  <text x="0" y="38" class="title">How to add archive material later</text>
  <text x="0" y="92" class="subtitle">reminder from the ghost in the README</text>
</svg>
