<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
<title id="title">Redacted packet flow sequence</title>
<desc id="desc">A linear packet flow showing traffic leaving the OT source, crossing the DMZ and internet edge to Azure, and highlighting return traffic stopping at an inbound firewall boundary.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1"><stop offset="0%" stop-color="#08111f"/><stop offset="100%" stop-color="#071420"/></linearGradient>
  <linearGradient id="good" x1="0" x2="1"><stop offset="0%" stop-color="#66e3ff"/><stop offset="100%" stop-color="#9bffcb"/></linearGradient>
</defs>
<rect width="1200" height="460" rx="24" fill="url(#bg)"/>
<g font-family="Inter, Arial, sans-serif">
  <text x="60" y="60" font-size="26" fill="#e8f1ff" font-weight="800">Redacted flow validation</text>
  <text x="60" y="90" font-size="15" fill="#9fb1c9">Observed outbound success, then analyzed return traffic behavior at the security boundary</text>
</g>
<g transform="translate(80,170)"><rect x="-80" y="-54" width="160" height="120" rx="20" fill="rgba(16,31,55,0.84)" stroke="rgba(141,191,255,0.18)"/><circle cx="0" cy="-76" r="24" fill="#08111f" stroke="#66e3ff" stroke-width="3"/><text x="0" y="-69" text-anchor="middle" font-size="14" fill="#e8f1ff" font-weight="700">1</text><text x="0" y="-18" text-anchor="middle" font-size="16" fill="#e8f1ff" font-weight="800">OT source</text><text x="0" y="12" text-anchor="middle" font-size="12" fill="#9fb1c9">Manufacturing data source initiates connection</text></g><g transform="translate(300,170)"><rect x="-80" y="-54" width="160" height="120" rx="20" fill="rgba(16,31,55,0.84)" stroke="rgba(141,191,255,0.18)"/><circle cx="0" cy="-76" r="24" fill="#08111f" stroke="#66e3ff" stroke-width="3"/><text x="0" y="-69" text-anchor="middle" font-size="14" fill="#e8f1ff" font-weight="700">2</text><text x="0" y="-18" text-anchor="middle" font-size="16" fill="#e8f1ff" font-weight="800">OT firewall</text><text x="0" y="12" text-anchor="middle" font-size="12" fill="#9fb1c9">Permits controlled outbound traffic</text></g><g transform="translate(520,170)"><rect x="-80" y="-54" width="160" height="120" rx="20" fill="rgba(16,31,55,0.84)" stroke="rgba(141,191,255,0.18)"/><circle cx="0" cy="-76" r="24" fill="#08111f" stroke="#66e3ff" stroke-width="3"/><text x="0" y="-69" text-anchor="middle" font-size="14" fill="#e8f1ff" font-weight="700">3</text><text x="0" y="-18" text-anchor="middle" font-size="16" fill="#e8f1ff" font-weight="800">DMZ relay</text><text x="0" y="12" text-anchor="middle" font-size="12" fill="#9fb1c9">Relay / DCM services traverse segmented boundary</text></g><g transform="translate(760,170)"><rect x="-80" y="-54" width="160" height="120" rx="20" fill="rgba(16,31,55,0.84)" stroke="rgba(141,191,255,0.18)"/><circle cx="0" cy="-76" r="24" fill="#08111f" stroke="#66e3ff" stroke-width="3"/><text x="0" y="-69" text-anchor="middle" font-size="14" fill="#e8f1ff" font-weight="700">4</text><text x="0" y="-18" text-anchor="middle" font-size="16" fill="#e8f1ff" font-weight="800">Edge firewall / NAT</text><text x="0" y="12" text-anchor="middle" font-size="12" fill="#9fb1c9">Policy + source translation validated</text></g><g transform="translate(1020,170)"><rect x="-80" y="-54" width="160" height="120" rx="20" fill="rgba(16,31,55,0.84)" stroke="rgba(141,191,255,0.18)"/><circle cx="0" cy="-76" r="24" fill="#08111f" stroke="#66e3ff" stroke-width="3"/><text x="0" y="-69" text-anchor="middle" font-size="14" fill="#e8f1ff" font-weight="700">5</text><text x="0" y="-18" text-anchor="middle" font-size="16" fill="#e8f1ff" font-weight="800">Azure endpoints</text><text x="0" y="12" text-anchor="middle" font-size="12" fill="#9fb1c9">Cloud destination reachable on expected path</text></g><path d="M160 170 H 220" stroke="url(#good)" stroke-width="6" fill="none"/><path d="M208 160 l 18 10 -18 10" fill="none" stroke="#9bffcb" stroke-width="6"/><path d="M380 170 H 440" stroke="url(#good)" stroke-width="6" fill="none"/><path d="M428 160 l 18 10 -18 10" fill="none" stroke="#9bffcb" stroke-width="6"/><path d="M600 170 H 660" stroke="url(#good)" stroke-width="6" fill="none"/><path d="M648 160 l 18 10 -18 10" fill="none" stroke="#9bffcb" stroke-width="6"/><path d="M840 170 H 930" stroke="url(#good)" stroke-width="6" fill="none"/><path d="M918 160 l 18 10 -18 10" fill="none" stroke="#9bffcb" stroke-width="6"/><path d="M1030 330 H 820 H 600" stroke="#ff9f68" stroke-width="6" fill="none"/><path d="M605 308 l -18 22 l 18 22" fill="none" stroke="#ff9f68" stroke-width="6"/><rect x="550" y="292" width="140" height="76" rx="18" fill="rgba(255,159,104,0.12)" stroke="#ff9f68" stroke-width="2"/><text x="620" y="324" text-anchor="middle" font-size="16" fill="#ffd2b8" font-weight="800">Return path focus</text><text x="620" y="348" text-anchor="middle" font-size="13" fill="#ffd2b8">Inbound behavior reviewed</text><g transform="translate(60,388)"><path d="M0 0 H 62" stroke="url(#good)" stroke-width="5"/><text x="78" y="5" font-size="14" fill="#e8f1ff">Validated outbound path</text><path d="M280 0 H 342" stroke="#ff9f68" stroke-width="5"/><text x="358" y="5" font-size="14" fill="#e8f1ff">Return-traffic analysis path</text></g></svg>