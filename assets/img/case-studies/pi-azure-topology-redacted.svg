<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
<title id="title">Redacted Azure topology</title>
<desc id="desc">A stylized topology showing a virtual WAN and hub connections to multiple cloud-side segments relevant to the case study.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1"><stop offset="0%" stop-color="#08111f"/><stop offset="100%" stop-color="#071420"/></linearGradient>
  <linearGradient id="hub" x1="0" x2="1"><stop offset="0%" stop-color="#66e3ff"/><stop offset="100%" stop-color="#9bffcb"/></linearGradient>
</defs>
<rect width="1200" height="620" rx="24" fill="url(#bg)"/>
<g font-family="Inter, Arial, sans-serif">
  <text x="60" y="62" font-size="26" fill="#e8f1ff" font-weight="800">Redacted cloud-side topology</text>
  <text x="60" y="92" font-size="15" fill="#9fb1c9">Simplified representation of the virtual WAN / hub routing view used during validation</text>
</g>
<g stroke="#9fb1c9" stroke-width="4" fill="none" opacity="0.8">
  <path d="M170 310 H310"/>
  <path d="M410 310 H560"/>
  <path d="M410 310 C 540 220, 620 180, 730 170"/>
  <path d="M410 310 C 540 380, 620 420, 730 450"/>
  <path d="M780 170 H980"/>
  <path d="M780 450 H980"/>
  <path d="M780 310 H980"/>
  <path d="M310 310 C 350 230, 370 190, 410 170"/>
  <path d="M310 310 C 350 310, 350 310, 410 310"/>
  <path d="M310 310 C 350 390, 370 430, 410 450"/>
</g>
<circle cx="110" cy="310" r="24" fill="#07111f" stroke="#66e3ff" stroke-width="4"/><text x="152" y="315" font-size="15" fill="#e8f1ff">Manufacturing egress</text><rect x="326" y="146" width="68" height="48" rx="14" fill="#07111f" stroke="#9bffcb" stroke-width="4"/><text x="402" y="175" font-size="15" fill="#e8f1ff">Regional cloud ingress</text><rect x="326" y="286" width="68" height="48" rx="14" fill="#07111f" stroke="#66e3ff" stroke-width="4"/><text x="402" y="315" font-size="15" fill="#e8f1ff">Core hub</text><rect x="326" y="426" width="68" height="48" rx="14" fill="#07111f" stroke="#9bffcb" stroke-width="4"/><text x="402" y="455" font-size="15" fill="#e8f1ff">Secondary hub / DR</text><rect x="696" y="146" width="68" height="48" rx="14" fill="#07111f" stroke="#e8f1ff" stroke-width="4"/><text x="772" y="175" font-size="15" fill="#e8f1ff">Analytics segment</text><rect x="696" y="286" width="68" height="48" rx="14" fill="#07111f" stroke="#e8f1ff" stroke-width="4"/><text x="772" y="315" font-size="15" fill="#e8f1ff">Shared services</text><rect x="696" y="426" width="68" height="48" rx="14" fill="#07111f" stroke="#e8f1ff" stroke-width="4"/><text x="772" y="455" font-size="15" fill="#e8f1ff">Security / return path</text><circle cx="1030" cy="170" r="24" fill="#10351e" stroke="#9bffcb" stroke-width="4"/><text x="1072" y="175" font-size="15" fill="#e8f1ff">Endpoint group A</text><circle cx="1030" cy="310" r="24" fill="#10351e" stroke="#9bffcb" stroke-width="4"/><text x="1072" y="315" font-size="15" fill="#e8f1ff">Endpoint group B</text><circle cx="1030" cy="450" r="24" fill="#10351e" stroke="#9bffcb" stroke-width="4"/><text x="1072" y="455" font-size="15" fill="#e8f1ff">Observability / diagnostics</text>
<g transform="translate(60 520)">
  <rect width="480" height="64" rx="18" fill="rgba(16,31,55,0.84)" stroke="rgba(141,191,255,0.18)"/>
  <text x="20" y="28" font-size="14" fill="#e8f1ff">Used to validate that the problem was not simply “can Azure be reached?”</text>
  <text x="20" y="48" font-size="14" fill="#9fb1c9">The goal was to understand which boundary allowed outbound flow and which boundary affected return traffic.</text>
</g>
</svg>